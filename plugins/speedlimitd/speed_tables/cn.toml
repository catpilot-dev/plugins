# China — PRC Road Traffic Safety Law (GB 5768)
# Common limits: 30, 40, 60, 80, 100, 120 km/h
# 40 km/h for ramps and tight turns (~50m radius)

bbox = [18, 54, 73, 135]  # [min_lat, max_lat, min_lon, max_lon]
default_fallback = 40

# Lane width → road-type class (GB 50647, Code for Design of Urban Road Engineering).
# Used as a fusion signal when OSM highway type is weak/unknown: the lane width
# observed by the vision model votes a road class alongside OSM and lane count.
# Entries are sorted by `min` descending; first match where lane_width ≥ min wins.
#   ≥ 3.60 m  highway / urban expressway — trunk-class (≥3.75 is GB highway)
#   ≥ 3.25 m  city arterial — primary-class (urban trunk/primary)
#   ≥ 2.90 m  city collector / mixed — secondary-class
#   otherwise residential / narrow
[[lane_width_class]]
min = 3.60
type = "trunk"
[[lane_width_class]]
min = 3.25
type = "primary"
[[lane_width_class]]
min = 2.90
type = "secondary"
[[lane_width_class]]
min = 0.0
type = "residential"

[urban]
motorway      = { multi = 100, single = 100 }
motorway_link = { multi = 40,  single = 40 }
trunk         = { multi = 80,  single = 60 }
trunk_link    = { multi = 40,  single = 40 }
primary       = { multi = 60,  single = 60 }
primary_link  = { multi = 40,  single = 40 }
secondary     = { multi = 60,  single = 60 }
tertiary      = { multi = 40,  single = 40 }
residential   = { multi = 30,  single = 30 }
unclassified  = { multi = 40,  single = 40 }
living_street = { multi = 30,  single = 30 }
service       = { multi = 30,  single = 30 }

[nonurban]
motorway      = { multi = 120, single = 120 }
motorway_link = { multi = 40,  single = 40 }
trunk         = { multi = 100, single = 80 }
trunk_link    = { multi = 40,  single = 40 }
primary       = { multi = 80,  single = 80 }
primary_link  = { multi = 40,  single = 40 }
secondary     = { multi = 60,  single = 60 }
tertiary      = { multi = 40,  single = 40 }
unclassified  = { multi = 40,  single = 30 }
